name: Nightly visual regression

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:nightly
      - name: 上传视觉回归诊断
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-visual-diagnostics
          path: |
            test-results/**/editor-*-actual.png
            test-results/**/editor-*-expected.png
            test-results/**/editor-*-diff.png
            test-results/**/test-failed-*.png
            test-results/**/error-context.md
          if-no-files-found: ignore
